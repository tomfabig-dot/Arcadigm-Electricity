        <h1>Arcadigm — Understand your electricity use. See where you can save.</h1>
        <p>Arcadigm helps Australian businesses understand their electricity usage, and what they can do about it.</p>

        <h2>What we do</h2>
        <p>Electricity shouldn't be complicated. We help you understand:</p>
        <ol>
          <li>Are you on a good electricity contract?</li>
          <li>What can you do without spending to reduce your energy bills?</li>
          <li>What are the highest-impact projects to reduce your energy spend?</li>
        </ol>

        <h2>Three plans</h2>

        <h3>Free — $0, always free, no card required</h3>
        <p>Assess your usage and compare to other contracts. Includes CDR connection to your retailer, 30-minute meter data back-filled, portal access, contract comparison report, and peak-factor cost breakdown.</p>

        <h3>Monitor &amp; Minimise — $900 per site for year one, $1,800/year thereafter</h3>
        <p>Identify, enact and monitor no-spend steps to reduce consumption. Adds anomaly alerts with notifications, AI-identified savings via EMMA AI, and project assessment tools in the portal.</p>

        <h3>Develop &amp; Decarbonise — $1,600 per site for year one, $3,200/year thereafter</h3>
        <p>Understand your electricity's emissions, with advice on what projects to investigate. Adds live grid emissions matching, automated tariff checks, AASB-compliant report output, and a shortlist of projects with engineer descriptions.</p>

        <p><strong>Launch offer:</strong> 50% off for life for our first 20 sites. Launch customers also get a free product walkthrough and extended support.</p>

        <h2>How it works</h2>
        <ol>
          <li><strong>Sign up.</strong> Quick data access through Fiskil. No hardware required, or site visit. Your portal and historic data are ready in minutes.</li>
          <li><strong>Explore your data.</strong> Every site with high resolution. Includes standard assessments and our project assessment tools to show you project ROI based on your specific information. Resolution limited to smart meter installed.</li>
          <li><strong>Understand how you can manage your consumption.</strong> Suggested improvements are provided — non-capex actions, plus perspective on which capex projects could best suit your site.</li>
        </ol>

        <h2>Project delivery</h2>
        <p>If a project is worth doing, we can direct you to our execution partners and help ensure a smooth process to scope, quote, and install. We are here to make electricity easy for you.</p>

        <h2>Track record</h2>
        <p>Arcadigm runs the EMMA AI engine from <a href="https://optimalmonitoring.com/">Optimal Group (UK)</a>, our monitoring partner. UK case studies have surfaced £5,000–£8,000 in annual savings per site with up to 45% emissions reductions. We seek to validate these findings in Australia.</p>
