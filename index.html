        <h1>Arcadigm — Understand your electricity use. See where you can save.</h1>
        <p>Arcadigm gives Australian businesses a clear view of every meter. We connect through the Consumer Data Right (CDR), so your data is in the portal the moment you sign up. Want a written readout with recommendations? It lands in five business days.</p>

        <h2>What we do</h2>
        <p>Electricity shouldn't be complicated. We help you answer three questions:</p>
        <ol>
          <li>Are you on a good electricity contract?</li>
          <li>What can you do without spending to reduce your energy bills?</li>
          <li>What would the highest-impact projects look like if you want to reduce your energy spend?</li>
        </ol>

        <h2>Three plans</h2>

        <h3>Free — $0, always free, no card required</h3>
        <p>Assess your usage and compare to other contracts. Includes CDR connection to your retailer, 30-minute meter data back-filled, portal access, contract comparison report, and peak-factor cost breakdown.</p>

        <h3>Monitor &amp; Minimise — $900 per site for year one, $1,800/year thereafter</h3>
        <p>Identify, enact and monitor no-spend steps to reduce consumption. Adds anomaly alerts with notifications, AI-identified savings via EMMA AI, and project assessment tools in the portal.</p>

        <h3>Develop &amp; Decarbonise — $1,600 per site for year one, $3,200/year thereafter</h3>
        <p>Understand your electricity's emissions, with support to decide what projects to investigate and how to deliver them. Adds live grid emissions matching, automated tariff checks, AASB-compliant report output, and a shortlist of projects with engineer descriptions.</p>

        <p><strong>Launch offer:</strong> first 20 sites get 50% off for life on Monitor &amp; Minimise and Develop &amp; Decarbonise.</p>

        <h2>How it works</h2>
        <ol>
          <li><strong>Sign up.</strong> Two-click consent through Fiskil. No hardware, no site visit. Your portal is ready in minutes; historic data back-fills within the hour.</li>
          <li><strong>Explore your data.</strong> Every site, every 30 minutes, tariff-aware and weather-normalised.</li>
          <li><strong>Get your written readout.</strong> Within five business days you'll have a written report per site — what's working, what isn't, and what it's worth to fix.</li>
        </ol>

        <h2>Project delivery</h2>
        <p>Once a shortlist is worth building, we can help you build it. Zero upfront capex — our fee comes out of what the meter actually saves. We negotiate competitive rates with engineers and maintain a high, consistent standard across every project.</p>

        <h2>Track record</h2>
        <p>Arcadigm runs the EMMA AI engine from <a href="https://optimalmonitoring.com/">Optimal Group (UK)</a>, our monitoring partner. UK case studies have surfaced £5,000–£8,000 in annual savings per site with up to 45% emissions reductions.</p>
